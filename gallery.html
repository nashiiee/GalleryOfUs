<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Museum — A Private Collection</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="gallery.css">
</head>
<body>

<!-- ══════════════════════════════
     GALLERY PAGE
══════════════════════════════ -->
<div id="gallery-page" class="page active">

  <header class="museum-header">
    <div class="museum-label">Private Collection · Est. 2026</div>
    <h1 class="museum-title">THE GALLERY OF US</h1>
    <p class="museum-subtitle">A curated collection of shared moments</p>
    <div class="header-ornament" style="margin-top:1.2rem;margin-bottom:0;">
      <span></span>
      <svg viewBox="0 0 24 24"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>
      <span></span>
    </div>
  </header>

  <div class="collection-bar">
    <div class="col-left">Permanent Collection</div>
    <div class="col-right">Select a work to view its story</div>
  </div>

  <main class="gallery-wall">
    <div class="gallery-grid" id="gallery-grid">
      <!-- Exhibits injected by JS -->
    </div>
  </main>

  <footer class="museum-footer">THE GALLERY OF US &nbsp;·&nbsp; ALL MEMORIES RESERVED</footer>
</div>

<!-- ══════════════════════════════
     DETAIL PAGE
══════════════════════════════ -->
<div id="detail-page" class="page">

  <header class="museum-header">
    <div class="museum-label">Exhibit View</div>
    <h1 class="museum-title">THE GALLERY OF US</h1>
  </header>

  <main class="exhibit-room">
    <button class="back-btn" onclick="showGallery()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Return to Collection
    </button>

    <div class="exhibit-main-frame">
      <div class="exhibit-main-inner">
        <img id="detail-img" class="exhibit-main-img" src="" alt="">
      </div>
    </div>

    <div class="wall-label">
      <div class="wall-label-number" id="detail-number">Exhibit 001</div>
      <h2 class="wall-label-title" id="detail-title"></h2>
      <div class="wall-label-meta">
        <div class="wall-label-tag"><strong>Date</strong> <span id="detail-date"></span></div>
        <div class="wall-label-tag"><strong>Location</strong> <span id="detail-location"></span></div>
      </div>
    </div>

    <div class="catalog-divider">
      <span></span>
      <svg viewBox="0 0 24 24"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>
      <span></span>
    </div>

    <div class="catalog-text" id="detail-story"></div>
  </main>

  <footer class="museum-footer">THE GALLERY OF US &nbsp;·&nbsp; ALL MEMORIES RESERVED</footer>
</div>

<script src="gallery.js"></script>
</body>
</html>
